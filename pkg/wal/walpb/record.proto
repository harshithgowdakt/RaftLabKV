syntax = "proto3";
package walpb;

option go_package = "github.com/harshithgowdakt/raftlabkv/pkg/wal/walpb";

message Record {
    int64  type = 1;
    uint32 crc  = 2;
    bytes  data = 3;
}

// Snapshot is a lightweight marker written to the WAL to record
// that a snapshot was taken at the given term and index.
message Snapshot {
    uint64 index = 1;
    uint64 term  = 2;
}
